<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FDX Detector</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>FDX Detector</h1>
          <p id="status">Starting backend check...</p>
        </div>
        <nav class="pageNav" aria-label="Pages">
          <button class="pageTab active" type="button" data-page-target="detection" aria-selected="true">Detection</button>
          <button class="pageTab" type="button" data-page-target="faces" aria-selected="false">Faces to be detected</button>
        </nav>
      </header>

      <section id="detectionPage" class="page active" data-page="detection">
        <div class="sectionHeader">
          <div>
            <h2>Detection</h2>
            <p id="resultCount">0 detection results</p>
          </div>
          <button id="clear" type="button">Clear results</button>
        </div>

        <section id="dropzone" class="dropzone">
          <input id="fileInput" type="file" accept="image/*" multiple>
          <label for="fileInput">
            <span>Drop images here</span>
            <strong>Choose images</strong>
          </label>
        </section>

        <section class="controls">
          <label>
            Confidence
            <input id="threshold" type="range" min="0.01" max="0.99" step="0.01" value="0.8">
            <output id="thresholdValue">0.80</output>
          </label>
        </section>

        <section id="results" class="results" aria-live="polite"></section>
      </section>

      <section id="facesPage" class="page" data-page="faces" hidden>
        <div class="sectionHeader">
          <div>
            <h2>Faces to be detected</h2>
            <p id="faceCount">0 target faces</p>
          </div>
          <button id="clearFaces" type="button">Clear faces</button>
        </div>

        <section class="targetControls">
          <label>
            Name
            <input id="targetNameInput" type="text" placeholder="Person name">
          </label>
        </section>

        <section id="targetDropzone" class="dropzone compact">
          <input id="targetFileInput" type="file" accept="image/*" multiple>
          <label for="targetFileInput">
            <span>Add the face images you want to find</span>
            <strong>Add target faces</strong>
          </label>
        </section>

        <section id="facesEmpty" class="emptyState">
          <h3>No target faces yet</h3>
          <p>Add images above</p>
        </section>
        <section id="facesGrid" class="facesGrid" aria-live="polite"></section>
      </section>
    </main>

    <template id="resultTemplate">
      <article class="result">
        <div class="canvasWrap">
          <canvas></canvas>
        </div>
        <div class="meta">
          <h2></h2>
          <p class="summary"></p>
          <pre></pre>
        </div>
      </article>
    </template>

    <template id="faceTemplate">
      <article class="faceCard">
        <img alt="">
        <div>
          <h3></h3>
          <p></p>
        </div>
        <label class="faceNameField">
          Name
          <input class="faceName" type="text">
        </label>
        <dl>
          <div>
            <dt>Status</dt>
            <dd class="confidence"></dd>
          </div>
          <div>
            <dt>Source</dt>
            <dd class="source"></dd>
          </div>
        </dl>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
